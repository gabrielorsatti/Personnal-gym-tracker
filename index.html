<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stéphane-IA a déménagé !</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f1316;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 480px; }
        h1 { font-size: 1.8rem; margin-bottom: 16px; }
        p { font-size: 1.1rem; color: #ccc; line-height: 1.5; margin-bottom: 24px; }
        .countdown { font-size: 0.95rem; color: #888; margin-bottom: 32px; }
        .button {
            display: inline-block;
            background: #a7e8c9;
            color: #0f1316;
            padding: 16px 32px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: opacity 0.2s;
        }
        .button:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏋️ Stéphane-IA a déménagé !</h1>
        <p>Redirection vers <strong>app.stephane.fit</strong> en cours…</p>
        <p class="countdown">Redirection dans <span id="timer">3</span> secondes…</p>
        <a href="https://app.stephane.fit" class="button">Aller sur app.stephane.fit →</a>
    </div>

    <script>
        (function () {
            var newUrl = 'https://app.stephane.fit';

            // Unregister all Service Workers
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function (registrations) {
                    registrations.forEach(function (r) { r.unregister(); });
                });
            }

            // Clear all caches (Cache API)
            if ('caches' in window) {
                caches.keys().then(function (names) {
                    names.forEach(function (name) { caches.delete(name); });
                });
            }

            // Clear local storage
            try { localStorage.clear(); } catch (e) {}
            try { sessionStorage.clear(); } catch (e) {}

            // Countdown & redirect
            var seconds = 3;
            var timerEl = document.getElementById('timer');
            var interval = setInterval(function () {
                seconds--;
                if (timerEl) timerEl.textContent = seconds;
                if (seconds <= 0) {
                    clearInterval(interval);
                    window.location.replace(newUrl);
                }
            }, 1000);
        })();
    </script>
</body>
</html>
