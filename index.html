<!DOCTYPE html>
<html>
<head>
    <title>Stéphane-IA a déménagé !</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #0f1316; color: white; }
        .button { background: #a7e8c9; color: #0f1316; padding: 15px 25px; text-decoration: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🏋️‍♂️ Stéphane-IA fait peau neuve !</h1>
    <p>Nous avons changé d'adresse pour vous offrir une meilleure expérience.</p>
    <br><br>
    <a href="https://app.stephane.fit/" class="button">DÉCOUVRIR LA NOUVELLE VERSION</a>
    <p style="margin-top: 40px; font-size: 0.8em; color: #888;">
        Note : Une fois sur le nouveau site, pensez à supprimer cette ancienne icône <br> 
        et à ajouter la nouvelle à votre écran d'accueil.
    </p>

    <script>
        // Ce script force la désinscription de l'ancien Service Worker (le cache)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
                for(let registration of registrations) {
                    registration.unregister();
                }
            });
        }
    </script>
</body>
</html>
